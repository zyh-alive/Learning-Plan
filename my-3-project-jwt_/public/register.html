<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            padding: 16px;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 32px;
            width: 100%;
            max-width: 360px;
        }
        h1 {
            margin: 0 0 24px 0;
            font-size: 24px;
            font-weight: 600;
            color: #333;
            text-align: center;
        }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }
        input {
            width: 100%;
            height: 44px;
            padding: 0 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }
        input:focus {
            border-color: #1890ff;
        }
        input::placeholder {
            color: #aaa;
        }
        button {
            width: 100%;
            height: 44px;
            margin-top: 8px;
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            background: #1890ff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #40a9ff;
        }
        button:disabled {
            background: #bbb;
            cursor: not-allowed;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
        .footer a {
            color: #1890ff;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>注册</h1>
        <form id="registerForm">
            <div class="field">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="field">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <div class="field">
                <label for="age">年龄</label>
                <input type="number" id="age" name="age" placeholder="请输入年龄" min="1" max="150">
            </div>
            <div class="field">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱">
            </div>
            <button type="submit" id="submitBtn">注册</button>
        </form>
        <p class="footer">已有账号？<a href="login.html">去登录</a></p>
    </div>
    <script>
        const API_BASE = 'http://localhost:3003';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            const data = {
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                age: document.getElementById('age').value ? parseInt(document.getElementById('age').value, 10) : null,
                email: document.getElementById('email').value.trim() || null
            };

            try {
                const res = await fetch(API_BASE + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (res.ok) {
                    window.location.href = 'login.html?registered=1';
                } else {
                    alert(result.message || '注册失败');
                }
            } catch (err) {
                alert('网络错误，请检查后端是否运行在 ' + API_BASE);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
