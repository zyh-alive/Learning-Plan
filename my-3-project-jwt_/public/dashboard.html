<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: #f5f5f5;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wrap {
            width: 100%;
            max-width: 560px;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 32px;
            margin-bottom: 16px;
        }
        .welcome {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin: 0 0 24px 0;
            text-align: center;
        }
        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .big-card {
            flex: 1;
            min-width: 200px;
            max-width: 260px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 28px;
            text-align: center;
            text-decoration: none;
            color: #333;
            font-size: 18px;
            font-weight: 500;
            transition: box-shadow 0.2s;
        }
        .big-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .big-card .icon { font-size: 32px; margin-bottom: 12px; }
        .big-card.logout {
            cursor: pointer;
            border: none;
            font: inherit;
            display: block;
            width: 100%;
        }
        .big-card.logout { color: #e74c3c; }
        .big-card.logout:hover { color: #c0392b; }
        .status {
            margin-top: 24px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1 class="welcome" id="welcome">欢迎，</h1>
            <div class="cards">
                <a href="profile.html" class="big-card">
                    <div class="icon">👤</div>
                    我的资料
                </a>
                <button type="button" class="big-card logout" id="logoutBtn">
                    <div class="icon">🚪</div>
                    退出登录
                </button>
            </div>
        </div>
        <p class="status">当前登录状态：已登录</p>
    </div>
    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        } else {
            // 从 JWT 里解析出用户名（不校验签名，只读 payload）
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                document.getElementById('welcome').textContent = '欢迎，' + (payload.username || '用户');
            } catch (e) {
                document.getElementById('welcome').textContent = '欢迎，用户';
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
